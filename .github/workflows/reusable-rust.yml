# Reusable Rust quality gate (fmt, clippy, test).
name: Reusable — Rust checks

on:
  workflow_call:
    inputs:
      run-fmt:
        type: boolean
        required: false
        default: true
      run-clippy:
        type: boolean
        required: false
        default: true
      run-test:
        type: boolean
        required: false
        default: true

jobs:
  fmt:
    name: rust-fmt
    runs-on: ubuntu-latest
    if: inputs.run-fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: rust-clippy
    runs-on: ubuntu-latest
    if: inputs.run-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude openatlas-ui-wasm --no-deps -- -D warnings

  test:
    name: rust-test
    runs-on: ubuntu-latest
    if: inputs.run-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude openatlas-ui-wasm
